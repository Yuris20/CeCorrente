version: '3.8'

services:
  # ---- Database MySQL ----
  db:
    image: mysql:8.0
    container_name: cecorrente_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      # Importazione automatica del database all'avvio
      - ./src/assets/db/cecorrente.sql:/docker-entrypoint-initdb.d/cecorrente.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    networks:
      - cecorrente_net

  # ---- Applicazione PHP ----
  app:
    build: .
    container_name: cecorrente_app
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - cecorrente_net

volumes:
  db_data:

networks:
  cecorrente_net:
    driver: bridge