# ============================================================
# .github/workflows/security.yml
# Pipeline CI/CD con tutti i tool di sicurezza
# Si esegue ad ogni push e pull request su main
# ============================================================

name: CI/CD + Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ============================================================
  # JOB 1: Build - Verifica che il Docker image si costruisca
  # ============================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cecorrente:latest .

      - name: Login su DockerHub
        # Si esegue solo su push a main, non su pull request
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push su DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag cecorrente:latest ${{ secrets.DOCKERHUB_USERNAME }}/cecorrente:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cecorrente:latest

  # ============================================================
  # JOB 2: GitGuardian - Cerca segreti/credenziali nel codice
  # ============================================================
  gitguardian:
    name: GitGuardian Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Serve per analizzare tutto lo storico git

      - name: GitGuardian Scan
        uses: GitGuardian/ggshield-action@v1.29.0
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ============================================================
  # JOB 3: Snyk - Trova vulnerabilità nelle dipendenze
  # ============================================================
  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js (serve per npm/package.json)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Installa dipendenze npm
        run: npm install

      - name: Snyk - Scan dipendenze npm
        uses: snyk/actions/node@master
        continue-on-error: true   # Non blocca la pipeline, mostra solo i problemi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Snyk - Scan Dockerfile
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: cecorrente:latest
          args: --severity-threshold=high

  # ============================================================
  # JOB 4: SonarCloud - Analisi qualità e sicurezza codice PHP
  # ============================================================
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessario per SonarCloud

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # Automatico, non serve configurarlo
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================
  # JOB 5: Semgrep - Analisi statica del codice PHP
  # ============================================================
  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Semgrep Scan PHP
        run: |
          semgrep ci \
            --config=p/php \
            --config=p/owasp-top-ten \
            --config=p/sql-injection \
            --config=p/xss \
            --sarif \
            --output=semgrep-results.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload risultati Semgrep
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
